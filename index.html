<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>8 March</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
color:white;
}

/* сцена занимает весь экран */

#scene{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:black;
overflow:hidden;
}

/* канвасы */

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* экран поворота */

#center{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:20;
padding:20px;
box-sizing:border-box;
}

#rotate{
font-size:70px;
animation:phone 1.6s ease-in-out infinite;
}

@keyframes phone{
0%{transform:rotate(0deg)}
50%{transform:rotate(90deg)}
100%{transform:rotate(0deg)}
}

#text{
font-size:28px;
margin-top:20px;
max-width:90%;
}

/* текст после сердца */

#heartText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
font-size:24px;
opacity:0;
transition:opacity 2s;
pointer-events:none;
}

</style>
</head>

<body>

<div id="scene">

<canvas id="bg"></canvas>
<canvas id="fx"></canvas>

<div id="center">
<div id="rotate">📱</div>
<div id="text">Поверни телефон на 90°</div>
</div>

<div id="heartText">
Будь счастлива<br>всегда 💗
</div>

</div>

<script>

const bg=document.getElementById("bg")
const ctx=bg.getContext("2d")

const fx=document.getElementById("fx")
const fctx=fx.getContext("2d")

function resize(){

bg.width=window.innerWidth
bg.height=window.innerHeight

fx.width=window.innerWidth
fx.height=window.innerHeight

}

resize()
window.addEventListener("resize",resize)

/* ---------- ELENE RAIN ---------- */

const columns=Math.floor(window.innerWidth/80)
const drops=[]

for(let i=0;i<columns;i++){
drops[i]=Math.random()*window.innerHeight
}

function rain(){

ctx.fillStyle="rgba(0,0,0,0.08)"
ctx.fillRect(0,0,bg.width,bg.height)

ctx.textAlign="center"
ctx.font="22px Arial"
ctx.shadowBlur=10
ctx.shadowColor="rgba(255,150,200,0.9)"

for(let i=0;i<drops.length;i++){

let y=drops[i]
let x=i*80+40

ctx.fillStyle="rgba(255,150,200,0.9)"

ctx.fillText("E",x,y)
ctx.fillText("l",x,y+22)
ctx.fillText("e",x,y+44)
ctx.fillText("n",x,y+66)
ctx.fillText("e",x,y+88)

drops[i]+=2.5

if(drops[i]>bg.height+100){
drops[i]=-100
}

}

requestAnimationFrame(rain)

}

rain()

/* ---------- PARTICLES ---------- */

let particles=[]

function morph(text){

let off=document.createElement("canvas")
let offCtx=off.getContext("2d")

off.width=fx.width
off.height=fx.height

offCtx.fillStyle="white"
offCtx.font="bold 80px Arial"
offCtx.textAlign="center"

let lines=text.split("\n")

lines.forEach((line,i)=>{
offCtx.fillText(line,off.width/2,off.height/2+(i*90))
})

let data=offCtx.getImageData(0,0,off.width,off.height)

let targets=[]

for(let y=0;y<data.height;y+=6){
for(let x=0;x<data.width;x+=6){

let i=(y*data.width+x)*4

if(data.data[i+3]>150){
targets.push({x:x,y:y})
}

}
}

particles.splice(targets.length)

while(particles.length<targets.length){

particles.push({
x:Math.random()*fx.width,
y:Math.random()*fx.height,
tx:0,
ty:0
})

}

targets.forEach((t,i)=>{
particles[i].tx=t.x
particles[i].ty=t.y
})

}

function draw(){

fctx.clearRect(0,0,fx.width,fx.height)

particles.forEach(p=>{

p.x+=(p.tx-p.x)*0.03
p.y+=(p.ty-p.y)*0.03

fctx.fillStyle="pink"
fctx.fillRect(p.x,p.y,2,2)

})

requestAnimationFrame(draw)

}

draw()

/* ---------- HEART ---------- */

function heart(){

let targets=[]

for(let t=0;t<Math.PI*2;t+=0.05){

let x=16*Math.pow(Math.sin(t),3)
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

targets.push({
x:fx.width/2+x*8,
y:fx.height/2-y*8
})

}

particles.splice(targets.length)

targets.forEach((p,i)=>{

if(!particles[i]){
particles[i]={x:Math.random()*fx.width,y:Math.random()*fx.height}
}

particles[i].tx=p.x
particles[i].ty=p.y

})

}

/* ---------- SEQUENCE ---------- */

setTimeout(()=>{
document.getElementById("center").style.display="none"
morph("3")
},4000)

setTimeout(()=>morph("2"),6000)
setTimeout(()=>morph("1"),8000)
setTimeout(()=>morph("С 8 Марта"),11000)
setTimeout(()=>morph("Будь\nСчастлива"),15000)
setTimeout(()=>morph("💐"),20000)
setTimeout(()=>morph("08.03.2026"),24000)

setTimeout(()=>{
heart()
setTimeout(()=>{
document.getElementById("heartText").style.opacity=1
},3000)
},28000)

</script>

</body>
</html>
