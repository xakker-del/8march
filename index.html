<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>8 March</title>

<style>

html,body{
margin:0;
padding:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
width:100%;
height:100%;
}

#scene{
position:fixed;
width:100vh;
height:100vw;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(90deg);
transform-origin:center;
}

canvas{
position:absolute;
top:0;
left:0;
}

#center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(180deg);
text-align:center;
z-index:20;
}

#rotate{
font-size:80px;
animation:phone 1.6s ease-in-out infinite;
}

@keyframes phone{
0%{transform:rotate(0deg)}
50%{transform:rotate(90deg)}
100%{transform:rotate(0deg)}
}

#text{
font-size:42px;
margin-top:20px;
}

#heartText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
font-size:28px;
opacity:0;
transition:opacity 2s;
pointer-events:none;
}

</style>
</head>

<body>

<div id="scene">

<canvas id="bg"></canvas>
<canvas id="fx"></canvas>

<div id="center">
<div id="rotate">📱</div>
<div id="text">Поверни телефон на 90°</div>
</div>

<div id="heartText">
Будь счастлива<br>всегда 💗
</div>

</div>

<script>

const bg=document.getElementById("bg")
const ctx=bg.getContext("2d")

const fx=document.getElementById("fx")
const fctx=fx.getContext("2d")

function resize(){
bg.width=fx.width=window.innerHeight
bg.height=fx.height=window.innerWidth
}

resize()

/* ---------- ELENE RAIN ---------- */

let columns
let drops=[]

function startRain(){

columns=Math.floor(bg.width/80)

for(let i=0;i<columns;i++){
drops[i]=Math.random()*bg.height
}

rain()

}

function rain(){

ctx.fillStyle="rgba(0,0,0,0.06)"
ctx.fillRect(0,0,bg.width,bg.height)

ctx.textAlign="center"
ctx.font="26px Arial"
ctx.shadowBlur=10
ctx.shadowColor="rgba(255,150,200,0.9)"

for(let i=0;i<drops.length;i++){

let y=drops[i]
let x=i*80+40

ctx.fillStyle="rgba(255,150,200,0.9)"

ctx.fillText("E",x,y)
ctx.fillText("l",x,y+26)
ctx.fillText("e",x,y+52)
ctx.fillText("n",x,y+78)
ctx.fillText("e",x,y+104)

drops[i]+=2.6

if(drops[i]>bg.height+120){
drops[i]=-120
}

}

requestAnimationFrame(rain)

}

/* ---------- PARTICLES ---------- */

let particles=[]
let hearts=[]

function morph(text){

let off=document.createElement("canvas")
let offCtx=off.getContext("2d")

off.width=fx.width
off.height=fx.height

offCtx.fillStyle="white"
offCtx.font="bold 120px Arial"
offCtx.textAlign="center"

let lines=text.split("\n")

lines.forEach((line,i)=>{
offCtx.fillText(line,off.width/2,off.height/2+(i*120))
})

let data=offCtx.getImageData(0,0,off.width,off.height)

let targets=[]

for(let y=0;y<data.height;y+=6){
for(let x=0;x<data.width;x+=6){

let i=(y*data.width+x)*4

if(data.data[i+3]>150){
targets.push({x:x,y:y})
}

}
}

particles.splice(targets.length)

while(particles.length<targets.length){

particles.push({
x:Math.random()*fx.width,
y:Math.random()*fx.height,
tx:0,
ty:0
})

}

targets.forEach((t,i)=>{
particles[i].tx=t.x
particles[i].ty=t.y
})

}

function draw(){

fctx.clearRect(0,0,fx.width,fx.height)

particles.forEach(p=>{

p.x+=(p.tx-p.x)*0.03
p.y+=(p.ty-p.y)*0.03

fctx.fillStyle="pink"
fctx.fillRect(p.x,p.y,2,2)

})

drawHearts()

requestAnimationFrame(draw)

}

draw()

/* ---------- HEART ---------- */

function heart(){

let targets=[]

for(let t=0;t<Math.PI*2;t+=0.05){

let x=16*Math.pow(Math.sin(t),3)
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

targets.push({
x:fx.width/2+x*10,
y:fx.height/2-y*10
})

}

particles.splice(targets.length)

targets.forEach((p,i)=>{

if(!particles[i]){
particles[i]={x:Math.random()*fx.width,y:Math.random()*fx.height}
}

particles[i].tx=p.x
particles[i].ty=p.y

})

}

/* ---------- SMALL HEARTS ---------- */

function spawnHearts(){

for(let i=0;i<40;i++){

hearts.push({
x:fx.width/2,
y:fx.height/2,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
size:14+Math.random()*10,
life:120
})

}

}

function drawHearts(){

for(let i=hearts.length-1;i>=0;i--){

let h=hearts[i]

h.x+=h.vx
h.y+=h.vy
h.life--

fctx.font=h.size+"px Arial"
fctx.fillText("❤️",h.x,h.y)

if(h.life<=0){
hearts.splice(i,1)
}

}

}

/* ---------- SEQUENCE ---------- */

setTimeout(()=>{
document.getElementById("center").style.display="none"
startRain()
morph("3")
},4000)

setTimeout(()=>morph("2"),6000)
setTimeout(()=>morph("1"),8000)
setTimeout(()=>morph("С 8 Марта"),11000)
setTimeout(()=>morph("Будь\nСчастлива"),15000)
setTimeout(()=>morph("💐"),20000)
setTimeout(()=>morph("08.03.2026"),24000)

setTimeout(()=>{

heart()

setInterval(()=>{
spawnHearts()
},600)

setTimeout(()=>{
document.getElementById("heartText").style.opacity=1
},3000)

},28000)

</script>

</body>
</html>
